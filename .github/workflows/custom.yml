name: Custom Video

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "What should the video be about? (free-form)"
        required: true
        type: string
      tone:
        description: "Tone"
        required: false
        default: "auto"
        type: choice
        options: [auto, serious, funny, hype, chill, educational]
      length:
        description: "Length"
        required: false
        default: "medium"
        type: choice
        options: [short, medium, max]
      visual_style:
        description: "Visual style"
        required: false
        default: "auto"
        type: choice
        options: [auto, people, no-people, nature, tech, abstract, animation]
      mood:
        description: "Mood"
        required: false
        default: "auto"
        type: choice
        options: [auto, uplifting, mysterious, energetic, calm, dark, nostalgic]
      voice:
        description: "Voice"
        required: false
        default: "auto"
        type: choice
        options: [auto, andrew, brian, christopher, prabhat, neerja]

permissions:
  contents: write   # to commit generation_log.jsonl

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      INPUT_PROMPT: ${{ github.event.inputs.prompt }}
      INPUT_TONE: ${{ github.event.inputs.tone }}
      INPUT_LENGTH: ${{ github.event.inputs.length }}
      INPUT_VISUAL: ${{ github.event.inputs.visual_style }}
      INPUT_MOOD: ${{ github.event.inputs.mood }}
      INPUT_VOICE: ${{ github.event.inputs.voice }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install -r requirements.txt
      - id: runid
        run: echo "run_id=custom-$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
      - name: Generate
        run: |
          python -m generators.custom \
            --run-id "${{ steps.runid.outputs.run_id }}" \
            --prompt "$INPUT_PROMPT" \
            --tone "$INPUT_TONE" \
            --length "$INPUT_LENGTH" \
            --visual-style "$INPUT_VISUAL" \
            --mood "$INPUT_MOOD" \
            --voice "$INPUT_VOICE"
      - uses: actions/upload-artifact@v4
        with:
          name: video-custom-${{ steps.runid.outputs.run_id }}
          path: output/${{ steps.runid.outputs.run_id }}/custom/
          retention-days: 7

      - name: Commit generation_log addition
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main || true
            git add data/generation_log.jsonl
            if git diff --cached --quiet 2>/dev/null; then
              echo "no log change"
              break
            fi
            git commit -m "log: record custom generation"
            if git push; then break; fi
            echo "push conflict, retrying..."
            sleep $((RANDOM % 4 + 1))
          done
