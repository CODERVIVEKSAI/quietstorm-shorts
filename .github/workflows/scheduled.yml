name: Daily Shorts

on:
  schedule:
    # 23:00 UTC = 4:30 AM IST. Generation takes ~10-15 min, so MP4s are
    # ready as artifacts by ~5 AM IST.
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # allow committing quote_state.json back

concurrency:
  group: daily-shorts
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        format: [quote, what_if, joke, golden_lady]
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Compute run ID
        id: runid
        run: echo "run_id=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Generate ${{ matrix.format }}
        run: python -m generators.${{ matrix.format }} --run-id "${{ steps.runid.outputs.run_id }}"

      - name: Upload MP4 + script + captions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ matrix.format }}-${{ steps.runid.outputs.run_id }}
          path: output/${{ steps.runid.outputs.run_id }}/${{ matrix.format }}/
          retention-days: 7

  consolidate:
    needs: generate
    runs-on: ubuntu-latest
    if: always()  # run even if some matrix jobs failed — partial state is still useful
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Download all daily artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: video-*
          merge-multiple: false
      - name: Update generation_log + quote_state
        run: python scripts/consolidate_state.py
      - name: Commit state changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/quote_state.json data/generation_log.jsonl
          if ! git diff --cached --quiet 2>/dev/null; then
            git commit -m "chore: advance state + record generation history"
            git push
          else
            echo "no state changes to commit"
          fi
