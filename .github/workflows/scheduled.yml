name: Daily Shorts

on:
  schedule:
    # 23:00 UTC = 4:30 AM IST. Generation takes ~10-15 min, so MP4s are
    # ready as artifacts by ~5 AM IST.
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # allow committing quote_state.json back

concurrency:
  group: daily-shorts
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        format: [quote, what_if, joke, golden_lady]
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Compute run ID
        id: runid
        run: echo "run_id=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Generate ${{ matrix.format }}
        run: python -m generators.${{ matrix.format }} --run-id "${{ steps.runid.outputs.run_id }}"

      - name: Upload MP4 + script + captions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ matrix.format }}-${{ steps.runid.outputs.run_id }}
          path: output/${{ steps.runid.outputs.run_id }}/${{ matrix.format }}/
          retention-days: 7

      - name: Commit quote state (quote format only)
        if: matrix.format == 'quote'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet data/quote_state.json 2>/dev/null; then
            git add data/quote_state.json
            git commit -m "chore: advance quote seed state"
            git push
          fi
