# Channel config. EDIT THIS FILE to rename the channel or change the voice.
# Every generator and the YouTube upload step reads from here.

handle: "@QuietStorm"
display_name: "QuietStorm"

# The guiding philosophy. Shows up in the bio, the pinned-post quote,
# and subtly shapes script tone.
tagline: "Work hard in silence. Let your success be your noise."

# Default voice used by every format unless a generator overrides it.
# Picked for the "typical YouTube Shorts" energetic narrator vibe.
# To swap, change the value below — see voices/Shorts notes at bottom.
default_voice: "en-US-AndrewMultilingualNeural"

# Short 9:16 video dimensions (YouTube Shorts requirement)
video:
  width: 1080
  height: 1920
  fps: 30
  max_duration_seconds: 58   # under 60 to be safe

# Per-format voice overrides — male-only, Shorts-energy picks
voices:
  quote: "en-US-AndrewMultilingualNeural"   # warm, modern male — reflective but not stiff
  what_if: "en-US-BrianMultilingualNeural"  # young energetic male, viral-Shorts feel
  joke: "en-US-RyanMultilingualNeural"      # younger conversational male, comedic timing
  golden_lady: "en-IN-PrabhatNeural"        # Indian English male — modern, trustworthy

# === Voice swap reference ===
# Shorts-style energetic:    en-US-EmmaMultilingualNeural, en-US-AvaMultilingualNeural,
#                            en-US-AndrewMultilingualNeural, en-US-BrianMultilingualNeural
# News/serious:              en-US-GuyNeural, en-US-AriaNeural
# TikTok-Jessie-ish (female):en-US-JennyNeural
# Indian English (male):     en-IN-PrabhatNeural
# Indian English (female):   en-IN-NeerjaNeural
# British:                   en-GB-RyanNeural, en-GB-SoniaNeural
# Browse all: python -c "import asyncio,edge_tts; print('\n'.join(v['ShortName'] for v in asyncio.run(edge_tts.list_voices()) if v['Locale'].startswith('en-')))"

# Hashtags appended to every upload description
base_hashtags:
  - "#shorts"
  - "#quietstorm"
  - "#daily"
